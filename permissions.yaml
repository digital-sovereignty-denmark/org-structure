# permissions.yaml
# Source of truth for team-to-repo access, default policies, and branch protections
# for the Digital Sovereignty Denmark GitHub organisation.

version: 1

# -----------------------------------------------------------------------------
# 1) Defaults — sensible org-wide policies you can apply to most repos
# -----------------------------------------------------------------------------
defaults:
  # Suggested baseline: transparent and contributor-friendly, but safe
  team_permissions:
    organisation-meta: read         # Org/meta team can read all repos by default
    knowledge-analysis: read
    tools-technical: read
    discussions-ideas: read
    resource-collections: read

  # Default repository settings when creating NEW repos (override per repo below)
  repository_settings:
    visibility: public              # Default to public to maximize transparency
    allow_merge_commit: true
    allow_squash_merge: true
    allow_rebase_merge: false
    delete_branch_on_merge: true
    enable_discussions: true
    enable_wiki: false
    enable_projects: false
    enable_issues: true
    default_branch: main
    require_signed_commits: false   # Can be tightened later if desired

  # Default branch protection (lightweight baseline)
  branch_protection:
    # Applies to the default branch unless overridden per repo
    required_status_checks:
      strict: true
      contexts: []                  # Add CI job names here when you introduce CI
    enforce_admins: true
    required_pull_request_reviews:
      required_approving_review_count: 1
      require_code_owner_reviews: false
      dismiss_stale_reviews: true
      require_last_push_approval: false
    restrictions:                   # No push restrictions by default
      users: []
      teams: []
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    require_linear_history: false   # Can enable later if you want pristine history

# -----------------------------------------------------------------------------
# 2) Repository-specific rules — override the defaults for specific repos
# -----------------------------------------------------------------------------
repositories:

  # Governance backbone repository (this repo)
  org-structure:
    team_permissions:
      organisation-meta: admin      # Org/Meta owns this repo
      knowledge-analysis: read
      tools-technical: read
      discussions-ideas: read
      resource-collections: read

    repository_settings:
      visibility: public
      enable_issues: true
      enable_discussions: true
      enable_wiki: false
      allow_merge_commit: true
      allow_squash_merge: true
      allow_rebase_merge: false
      delete_branch_on_merge: true
      default_branch: main
      require_signed_commits: false

    branch_protection:
      required_status_checks:
        strict: true
        contexts: []                # Add YAML validation CI job name when added
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        require_code_owner_reviews: true   # Enforce CODEOWNERS reviews here
        dismiss_stale_reviews: true
        require_last_push_approval: false
      restrictions:
        users: []
        teams: []                   # Keep open; CODEOWNERS + reviews provide control
      allow_force_pushes: false
      allow_deletions: false
      block_creations: false
      require_linear_history: true  # Cleaner history for governance changes


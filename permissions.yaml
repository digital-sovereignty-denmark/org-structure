# -----------------------------------------------------------------------------
# 3) Roles — optional: define a canonical mapping of abstract roles to GitHub perms
# -----------------------------------------------------------------------------
roles:
  admin: admin
  owner: admin
  maintainer: maintain
  write: push
  triage: triage
  read: pull

# -----------------------------------------------------------------------------
# 4) Notes for automation (non-functional, for humans/scripts)
# -----------------------------------------------------------------------------
notes:
  - "Use team slugs (lowercase with hyphens) when automating (e.g., organisation-meta)."
  - "When adding a new repo: copy a similar block from 'repositories' and adjust owners."
  - "Enable 'Require review from Code Owners' on repos that manage policies/standards."
  - "Add CI contexts under required_status_checks.contexts when you introduce validation."
  - "Keep CODEOWNERS aligned with the team that has admin/maintain rights."
